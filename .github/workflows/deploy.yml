name: Build, Push and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Build image
        run: docker build -t harbor.black2swan.ru/myapp/myapp:${{ github.sha }} .
      
      - name: Login to Harbor
        run: echo ${{ secrets.HARBOR_PASSWORD }} | docker login https://harbor.black2swan.ru -u admin --password-stdin
      
      - name: Push image
        run: |
          docker push harbor.black2swan.ru/myapp/myapp:${{ github.sha }}
          docker tag harbor.black2swan.ru/myapp/myapp:${{ github.sha }} harbor.black2swan.ru/myapp/myapp:latest
          docker push harbor.black2swan.ru/myapp/myapp:latest
      
      - name: Deploy to K3s
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/myapp
